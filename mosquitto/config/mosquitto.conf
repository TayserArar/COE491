# Global auth settings (apply to all listeners)
allow_anonymous false
password_file /mosquitto/custom/passwordfile
acl_file /mosquitto/custom/acl

# Plain-text listener — internal Docker network only (fake-ils, ingestion-service)
listener 1883

# TLS listener — for external clients (e.g. real ILS hardware, remote dashboards)
# Requires cert files to be mounted at run time (see docker-compose.yml).
# Comment out this block if certs are not available.
listener 8883
cafile  /mosquitto/tls/cert.pem
certfile /mosquitto/tls/cert.pem
keyfile  /mosquitto/tls/key.pem
tls_version tlsv1.2
