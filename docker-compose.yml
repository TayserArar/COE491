services:
  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "8081:80"
    depends_on:
      - api

  api:
    build: ./api
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ML_SERVICE_URL=http://ml-service:8001
      - UPLOAD_DIR=/data/uploads
      - CORS_ORIGINS=http://localhost:8081
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRES_MINUTES=480
      - INGESTION_API_KEY=${INGESTION_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_NAME=${ADMIN_NAME}
      - ENGINEER_EMAIL=${ENGINEER_EMAIL}
      - ENGINEER_PASSWORD=${ENGINEER_PASSWORD}
      - ENGINEER_NAME=${ENGINEER_NAME}
      - ENGINEER_DEPARTMENT=${ENGINEER_DEPARTMENT}
    volumes:
      - api_uploads:/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_started

  ml-service:
    build: ./ml-service
    ports:
      - "8001:8001"

  mqtt-broker:
    build: ./mosquitto
    environment:
      - MQTT_PRODUCER_USER=producer
      - MQTT_PRODUCER_PASS=producer_pass
      - MQTT_INGESTION_USER=ingestion
      - MQTT_INGESTION_PASS=ingestion_pass
    ports:
      - "1883:1883"

  ingestion-service:
    build: ./ingestion-service
    environment:
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
      - MQTT_USER=ingestion
      - MQTT_PASS=ingestion_pass
      - CORS_ORIGINS=http://localhost:8081,http://127.0.0.1:8081
      - DATABASE_URL=${DATABASE_URL}
      - API_URL=http://api:8000
      - INGESTION_API_KEY=${INGESTION_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - WINDOW_SECONDS=300
    ports:
      - "8080:8080"
    depends_on:
      - mqtt-broker

  fake-ils:
    build: ./fake-ils
    environment:
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
      - MQTT_USER=producer
      - MQTT_PASS=producer_pass
      - RATE_HZ=1
      - LOOP=true
      - SOURCE_ID=fake-ils-01
      - LLZ_DIR=/data/llz_logs
      - GP_DIR=/data/gp_logs
      - HEADER_LINES=17
    volumes:
      - "./30L LLZ:/data/llz_logs:ro"
      - "./30L GP:/data/gp_logs:ro"
    depends_on:
      - mqtt-broker

  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  pgdata:
  api_uploads:
